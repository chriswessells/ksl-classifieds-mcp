gates:
  spec_review:
    status: passed
    findings_critical: 6
    findings_high: 21
    resolved: true
    resolved_at: "2026-05-05T20:55:00Z"
    resolution_notes: |
      All Critical/High findings resolved by chief architect:
      - Transactions required for all multi-table writes
      - Action hash recovery bounded (max 2 attempts) with separate counter
      - Wire-format isolation via private raw types + From impls
      - Platform/Status as typed enums
      - XSS: askama auto-escaping + CSP headers
      - SSRF: research_item removed from scope (LLM handles conversationally)
      - HTTP timeouts added (connect 10s, total 30s)
      - Report server: singleton lifecycle, selections persisted before 200
      - track_item idempotent (dedup within 60s)
      - Sold detection hardened (2 confirms for 404, no transition on 5xx)
      - SQL injection: parameterized queries mandated
      - CSRF: 128-bit CSPRNG, hidden field, server-side validation
      - Supply chain: pin versions, commit Cargo.lock, cargo-audit in CI
      - Test strategy: fixtures, trait-based HTTP mock, pure parsing functions
      - Indexes on price_snapshots(listing_id, recorded_at)
      - Per-endpoint backoff (not global)
      - Graceful degradation on DB failure
      - Stage 1 uses HTML scraping (stable) over RSC server actions (fragile)
      - research_item removed (LLM already does this conversationally)
      - Platform support documented (macOS/Linux, not Windows)
      - Distribution via GitHub Releases + cargo install --locked
  red_lens_final:
    status: passed
    findings_critical: 0
    findings_high: 0
    resolved: true
    resolved_at: "2026-05-05T21:30:00Z"
    resolution_notes: "Zero Critical/High findings. Codebase secure for personal local tool."
